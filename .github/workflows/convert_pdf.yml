name: Convert TXT to PDF

on:
  workflow_dispatch:
    inputs:
      txt_filename:
        description: 'TXT filename inside input/ folder (e.g. test_6.txt)'
        required: true
        type: string

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install reportlab

      - name: Run pdf_format.py
        env:
          INPUT_TXT: input/${{ github.event.inputs.txt_filename }}
        run: python pdf_format.py

      - name: Commit and Push PDF
        run: |
          git config --global user.name "KrokPDFBot"
          git config --global user.email "bot@noreply.github.com"
          git add pdf/*.pdf
          git commit -m "PDF: ${{ github.event.inputs.txt_filename }}" || echo "No changes to commit"
          git push
